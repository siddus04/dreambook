<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Level Lab (Demo)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="reading_level_core.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .seg-btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
            border-radius: 0.375rem;
            border: 1px solid #cbd5e1;
            background: #fff;
        }
        .seg-btn:hover { background: #f8fafc; }
        .seg-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
        .seg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div class="max-w-6xl mx-auto p-6 space-y-6">
        <div class="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900">
            <strong>Demo lab</strong> — single-paragraph testing only. Use <em>Adjust Reading Level</em> in the editor for full chapters.
        </div>

        <header>
            <h1 class="text-2xl font-semibold">Reading Level Lab</h1>
            <p class="text-sm text-slate-600 mt-1">Iterate on style controls without simplifying an entire chapter.</p>
        </header>

        <section class="grid md:grid-cols-2 gap-4 rounded-lg border border-slate-200 bg-white p-4">
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1" for="api-key">OpenAI API key</label>
                <input id="api-key" type="password" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg" placeholder="sk-…" />
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1" for="model">Model</label>
                <select id="model" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini">GPT-4o Mini</option>
                </select>
            </div>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white p-4 space-y-4">
            <div>
                <div class="text-xs font-medium text-slate-500 mb-2">Audience</div>
                <div class="flex flex-wrap gap-2" id="level-btns">
                    <button type="button" class="seg-btn" data-level="elementary">Elementary</button>
                    <button type="button" class="seg-btn active" data-level="high-school">High School</button>
                    <button type="button" class="seg-btn" data-level="advanced-high-school">Advanced HS</button>
                    <button type="button" class="seg-btn" data-level="undergraduate">Undergraduate</button>
                </div>
            </div>

            <div>
                <div class="text-xs font-medium text-slate-500 mb-1">Vocabulary</div>
                <div class="flex flex-wrap gap-2" data-group="termHelp">
                    <button type="button" class="seg-btn active" data-value="plain">Define simply</button>
                    <button type="button" class="seg-btn" data-value="picture" id="btn-picture">Everyday comparisons</button>
                    <button type="button" class="seg-btn" data-value="visual">Vivid Analogies</button>
                </div>
            </div>

            <div>
                <div class="text-xs font-medium text-slate-500 mb-1">Voice</div>
                <div class="flex flex-wrap gap-2" data-group="tone">
                    <button type="button" class="seg-btn active" data-value="textbook">Standard textbook</button>
                    <button type="button" class="seg-btn" data-value="friendly">Conversational</button>
                    <button type="button" class="seg-btn" data-value="playful" id="btn-playful">Light &amp; memorable</button>
                </div>
            </div>

            <div>
                <div class="text-xs font-medium text-slate-500 mb-1">Length</div>
                <div class="flex flex-wrap gap-2" data-group="length">
                    <button type="button" class="seg-btn active" data-value="tight">Minimal</button>
                    <button type="button" class="seg-btn" data-value="balanced">Balanced</button>
                    <button type="button" class="seg-btn" data-value="roomy">More detail</button>
                </div>
            </div>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white p-4 space-y-3">
            <div class="flex flex-wrap items-end gap-3">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-medium text-slate-500 mb-1" for="preset">Preset paragraph</label>
                    <select id="preset" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg">
                        <option value="prokaryotes">Prokaryotes (Cell Biology)</option>
                        <option value="hooke">Hooke / cork cells</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <button id="run-btn" type="button" class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">
                    Run simplify
                </button>
            </div>
            <textarea id="source-text" rows="6" class="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg font-mono leading-relaxed"></textarea>
        </section>

        <section class="grid lg:grid-cols-2 gap-4">
            <div class="rounded-lg border border-slate-200 bg-white p-4">
                <h2 class="text-sm font-semibold mb-2">Source</h2>
                <p id="source-display" class="text-sm text-slate-700 whitespace-pre-wrap"></p>
            </div>
            <div class="rounded-lg border border-slate-200 bg-white p-4">
                <h2 class="text-sm font-semibold mb-2">Result</h2>
                <p id="result-display" class="text-sm text-slate-700 whitespace-pre-wrap text-slate-400">Run simplify to see output.</p>
            </div>
        </section>

        <section class="rounded-lg border border-slate-200 bg-white p-4">
            <h2 class="text-sm font-semibold mb-2">Diagnostics</h2>
            <dl id="diagnostics" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3 text-sm"></dl>
            <pre id="validation-detail" class="mt-3 text-xs bg-slate-100 rounded p-3 overflow-x-auto hidden"></pre>
        </section>
    </div>

    <script>
    (function () {
        'use strict';

        const PRESETS = {
            prokaryotes: 'Prokaryotes, including domains Bacteria and Archaea, are characterized by the absence of a membrane-bound nucleus and membrane-bound organelles. Their genetic material is localized within an irregularly shaped region called the nucleoid. Prokaryotes often contain extrachromosomal DNA in plasmids. The cellular envelope typically includes a plasma membrane, a rigid peptidoglycan cell wall, and sometimes an external polysaccharide capsule to evade host phagocytosis. Prokaryotic ribosomes are 70S in type and are distributed throughout the cytoplasm.',
            hooke: 'In 1665, the English scientist Robert Hooke used a primitive compound microscope to observe the desiccated structures of cork, coining the term "cell" due to their resemblance to monastic quarters.'
        };

        const apiKeyEl = document.getElementById('api-key');
        const modelEl = document.getElementById('model');
        const presetEl = document.getElementById('preset');
        const sourceEl = document.getElementById('source-text');
        const runBtn = document.getElementById('run-btn');
        let currentLevel = 'high-school';

        apiKeyEl.value = localStorage.getItem('openai_api_key') || '';
        modelEl.value = localStorage.getItem('openai_model') || 'gpt-4o';

        function bindSegmentGroup(containerSelector, onChange) {
            document.querySelectorAll(containerSelector).forEach(row => {
                row.querySelectorAll('.seg-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        if (btn.disabled) return;
                        row.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        onChange?.();
                    });
                });
            });
        }

        function readGroup(name) {
            const row = document.querySelector(`[data-group="${name}"]`);
            return row?.querySelector('.seg-btn.active')?.dataset.value || getDefaultReadingLevelStyleOptions()[name];
        }

        function getStyleOptions() {
            return normalizeReadingLevelStyleOptions({
                termHelp: readGroup('termHelp'),
                tone: readGroup('tone'),
                length: readGroup('length')
            }, currentLevel);
        }

        function updateGuardrails() {
            const isUndergrad = currentLevel === 'undergraduate';
            const pictureBtn = document.getElementById('btn-picture');
            const playfulBtn = document.getElementById('btn-playful');
            if (pictureBtn) {
                pictureBtn.disabled = isUndergrad;
                pictureBtn.title = isUndergrad ? 'Not recommended for this level' : '';
            }
            if (playfulBtn) {
                playfulBtn.disabled = isUndergrad;
                playfulBtn.title = isUndergrad ? 'Not recommended for this level' : '';
            }
            if (isUndergrad) syncButtonsToOptions(getStyleOptions());
        }

        function syncButtonsToOptions(opts) {
            ['termHelp', 'tone', 'length'].forEach(group => {
                const row = document.querySelector(`[data-group="${group}"]`);
                if (!row) return;
                row.querySelectorAll('.seg-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.value === opts[group]);
                });
            });
        }

        document.querySelectorAll('#level-btns .seg-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#level-btns .seg-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                updateGuardrails();
            });
        });

        bindSegmentGroup('[data-group="termHelp"]', updateGuardrails);
        bindSegmentGroup('[data-group="tone"]', updateGuardrails);
        bindSegmentGroup('[data-group="length"]');

        function loadPreset() {
            const key = presetEl.value;
            if (key === 'custom') return;
            sourceEl.value = PRESETS[key] || '';
        }

        presetEl.addEventListener('change', loadPreset);
        loadPreset();
        updateGuardrails();

        function setDiagnostic(label, value, ok) {
            const dl = document.getElementById('diagnostics');
            const dt = document.createElement('dt');
            dt.className = 'text-slate-500 text-xs';
            dt.textContent = label;
            const dd = document.createElement('dd');
            dd.className = ok === true ? 'text-green-700 font-medium' : ok === false ? 'text-red-700 font-medium' : 'text-slate-800';
            dd.textContent = value;
            dl.appendChild(dt);
            dl.appendChild(dd);
        }

        async function fetchSimplify(systemPrompt, userPrompt, temperature) {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKeyEl.value.trim()}`
                },
                body: JSON.stringify({
                    model: modelEl.value,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ],
                    temperature
                })
            });
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error?.message || `API error ${response.status}`);
            }
            const data = await response.json();
            return data.choices?.[0]?.message?.content || '';
        }

        runBtn.addEventListener('click', async () => {
            const source = sourceEl.value.replace(/\s+/g, ' ').trim();
            if (!source) return alert('Enter source text.');
            if (!apiKeyEl.value.trim()) return alert('Enter your OpenAI API key.');

            localStorage.setItem('openai_api_key', apiKeyEl.value.trim());
            localStorage.setItem('openai_model', modelEl.value);

            runBtn.disabled = true;
            runBtn.textContent = 'Running…';
            document.getElementById('source-display').textContent = source;
            document.getElementById('result-display').textContent = '…';
            document.getElementById('diagnostics').innerHTML = '';
            document.getElementById('validation-detail').classList.add('hidden');

            const styleOptions = getStyleOptions();
            const level = currentLevel;
            const temp = getReadingLevelTemperature(styleOptions, level);
            const bounds = getReadingLevelWordCountBounds(level, styleOptions);
            const clarifierTerms = extractReadingLevelClarifierCandidatesHeuristic(source, level).slice(0, 4);
            const protectedTerms = extractReadingLevelProtectedTerms(source);
            const prompt = getReadingLevelPromptForLevel(level, { sourceText: source, styleOptions });
            const systemPrompt = getReadingLevelSimplifySystemPrompt({ level, styleOptions });
            const userPrompt = buildReadingLevelUserPrompt(prompt, source, protectedTerms, clarifierTerms, styleOptions);

            const started = performance.now();
            let retried = false;
            let simplified = '';

            try {
                simplified = sanitizeReadingLevelOutput(await fetchSimplify(systemPrompt, userPrompt, temp));
                let validation = validateReadingLevelOutput(source, simplified, {
                    level, styleOptions, protectedTerms, clarifierTerms
                });

                if (!validation.ok) {
                    retried = true;
                    const repaired = await fetchSimplify(
                        getReadingLevelSimplifySystemPrompt({ level, styleOptions }),
                        buildReadingLevelRepairUserPrompt(source, simplified, protectedTerms, level, {
                            reasons: validation.reasons,
                            clarifierTerms,
                            styleOptions
                        }),
                        temp
                    );
                    simplified = sanitizeReadingLevelOutput(repaired);
                    validation = validateReadingLevelOutput(source, simplified, {
                        level, styleOptions, protectedTerms, clarifierTerms
                    });
                }

                const elapsed = Math.round(performance.now() - started);
                const srcWords = readingLevelWordCount(source);
                const outWords = readingLevelWordCount(simplified);
                const ratio = srcWords ? (outWords / srcWords).toFixed(2) : '—';

                document.getElementById('result-display').textContent = simplified || '(empty)';
                document.getElementById('result-display').classList.remove('text-slate-400');

                setDiagnostic('Style', getReadingLevelStyleSummaryLabel?.(level, styleOptions)
                    || `${level} · ${JSON.stringify(styleOptions)}`);
                setDiagnostic('Temperature', String(temp));
                setDiagnostic('Word ratio', `${ratio} (bounds ${bounds.min}–${bounds.max})`, validation.reasons.includes('too short') || validation.reasons.includes('too long') ? false : true);
                setDiagnostic('Validation', validation.ok ? 'PASS' : 'FAIL', validation.ok);
                setDiagnostic('Source words', String(srcWords));
                setDiagnostic('Output words', String(outWords));
                setDiagnostic('Elapsed', `${elapsed} ms`);
                setDiagnostic('Retried', retried ? 'yes' : 'no');

                if (!validation.ok) {
                    const detail = document.getElementById('validation-detail');
                    detail.textContent = validation.reasons.join('\n');
                    detail.classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('result-display').textContent = `Error: ${err.message}`;
                document.getElementById('result-display').classList.remove('text-slate-400');
            } finally {
                runBtn.disabled = false;
                runBtn.textContent = 'Run simplify';
            }
        });

        function getReadingLevelStyleSummaryLabel(level, styleOptions) {
            const opts = normalizeReadingLevelStyleOptions(styleOptions, level);
            const labels = getReadingLevelStyleDisplayLabels();
            return `${getReadingLevelTargetLabel(level)} · ${labels.termHelp[opts.termHelp]} · ${labels.tone[opts.tone]} · ${labels.length[opts.length]}`;
        }
    })();
    </script>
</body>
</html>
